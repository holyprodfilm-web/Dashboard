name: Qwen Code Review

on:
  pull_request:
    branches: [ main, develop ]   # замените на ваши основные ветки

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Qwen Coder
        uses: QwenLM/qwen-code-action@v1
        with:
          openai_api_key: ${{ secrets.QWEN_API_KEY }}
          prompt: "/review"   # или любая другая команда
